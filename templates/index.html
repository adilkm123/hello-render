<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Demo - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            color: white;
            min-height: 100vh;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: calc(100vh - 80px);
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        p {
            max-width: 600px;
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 30px;
        }

        .btn {
            background: white;
            color: #4f46e5;
            padding: 14px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            background: #f3f4f6;
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">Flask Demo</div>
    <div>
        <a href="/">Home</a>
        <a href="/about">About</a>
    </div>
</nav>

<section class="hero">
    <h1>Welcome to Flask</h1>
    <p>
        This is a simple, modern homepage built with HTML and CSS.
        You can use it as a starting point for your Flask projects.
    </p>

    <a href="/about" class="btn">Learn More</a>
</section>

</body>
</html>
